services:
  ai-platform:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-platform
    env_file:
      - .env
    ports:
      - "521:8000"
    volumes:
      - ./apps/novel-writer-agent/output:/app/apps/novel-writer-agent/output
      - ./apps/novel-writer-agent/novel_memory:/app/apps/novel-writer-agent/novel_memory
      - ./apps/novel-writer-agent/data:/app/apps/novel-writer-agent/data
    restart: unless-stopped
