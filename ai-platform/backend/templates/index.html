<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 创作平台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #637083;
      --line: #d9e0e8;
      --primary: #146c63;
      --primary-dark: #0f554f;
      --accent: #b45309;
      --danger: #b42318;
      --ok: #157347;
      --shadow: 0 12px 32px rgba(31, 41, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .topbar, main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    main { padding-top: 24px; padding-bottom: 44px; }
    h1 { margin: 0; font-size: 28px; line-height: 1.2; }
    h2 { margin: 0 0 10px; font-size: 20px; }
    h3 { margin: 0 0 10px; font-size: 17px; }

    .muted { color: var(--muted); line-height: 1.6; }
    .status { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--danger); }
    .dot.ok { background: var(--ok); }

    .auth-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 20px;
    }

    .login-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 240px)) auto;
      gap: 10px;
      align-items: end;
    }

    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    input, select, textarea, button { font: inherit; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    textarea { min-height: 130px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(20, 108, 99, 0.14);
    }

    .field.invalid input,
    .field.invalid select,
    .field.invalid textarea {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.13);
    }

    .field-error {
      display: none;
      color: var(--danger);
      font-size: 12px;
      line-height: 1.4;
    }

    .field.invalid .field-error { display: block; }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      min-height: 41px;
    }

    button:hover { background: var(--primary-dark); }
    button.secondary { background: #e8edf2; color: var(--text); }
    button.secondary:hover { background: #dbe3eb; }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr);
      gap: 18px;
      align-items: start;
    }

    .side-grid { display: grid; gap: 14px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .wide { grid-column: 1 / -1; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      color: var(--text);
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .result {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    pre {
      margin: 0;
      min-height: 180px;
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #111827;
      color: #e5e7eb;
      font-size: 13px;
      line-height: 1.55;
    }

    .preview pre { background: #fff; color: var(--text); }
    .message { min-height: 24px; margin-top: 8px; color: var(--accent); font-size: 14px; }
    .file-list { margin-top: 10px; display: grid; gap: 8px; }
    .file-link {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fbfcfd;
      color: var(--text);
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 4px 9px;
      background: #eef6f4;
      color: var(--primary);
      font-size: 12px;
      margin-bottom: 8px;
    }

    @media (max-width: 900px) {
      .auth-row, .grid, .result, .login-form, .form-grid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>AI 创作平台</h1>
        <div class="muted">本地开发、服务器部署的创作 Agent MVP</div>
      </div>
      <div class="status">
        <span id="status-dot" class="dot"></span>
        <span id="login-status">正在读取登录状态...</span>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-row">
      <form id="login-form" class="login-form">
        <label>
          用户名
          <input id="username" autocomplete="username" value="admin">
        </label>
        <label>
          密码
          <input id="password" type="password" autocomplete="current-password">
        </label>
        <button type="submit">登录</button>
      </form>
      <button id="logout-button" class="secondary" type="button">退出登录</button>
    </section>
    <div id="auth-message" class="message"></div>

    <section class="grid">
      <article class="card">
        <span class="badge">已接入</span>
        <h2>小说 Agent</h2>
        <p class="muted">生成内容会保存为 txt。执行生成、查看文件和邮件发送都需要登录。</p>

        <div class="form-grid">
          <label class="field">
            工具操作
            <select id="novel-action">
              <option value="generate">生成文章</option>
              <option value="status">查看状态</option>
              <option value="init">初始化记忆</option>
            </select>
            <span class="field-error"></span>
          </label>
          <label class="field">
            文章类型
            <select id="article-type">
              <option value="">请选择文章类型</option>
              <option value="long">长篇</option>
              <option value="short">短篇</option>
            </select>
            <span class="field-error"></span>
          </label>
          <label class="field">
            最小字数
            <input id="min-words" type="number" min="100" max="50000" step="100" placeholder="例如：500">
            <span class="field-error"></span>
          </label>
          <label class="field">
            最大字数
            <input id="max-words" type="number" min="100" max="50000" step="100" placeholder="例如：1000">
            <span class="field-error"></span>
          </label>
          <label class="field wide">
            描述
            <textarea id="description" placeholder="例如：写一个电梯里的中式恐怖小故事，结尾要解决核心问题"></textarea>
            <span class="field-error"></span>
          </label>
          <label class="field wide">
            风格
            <input id="style" placeholder="例如：中式恐怖、冷静克制、完整闭合">
            <span class="field-error"></span>
          </label>
          <label class="toggle-row">
            <input id="de-ai" type="checkbox">
            去 AI 味
          </label>
          <label class="toggle-row">
            <input id="send-email" type="checkbox">
            生成后发送 txt 到邮箱
          </label>
          <label id="email-row" class="field wide" style="display: none;">
            收件邮箱
            <input id="email-to" type="email" placeholder="name@example.com">
            <span class="field-error"></span>
          </label>
        </div>

        <button id="run-novel" type="button">执行</button>
        <div id="novel-message" class="message"></div>

        <div class="result">
          <div>
            <h3>执行结果</h3>
            <pre id="run-result">等待执行...</pre>
          </div>
          <div class="preview">
            <h3>最新输出文件预览</h3>
            <pre id="latest-preview">暂无输出。</pre>
          </div>
        </div>
      </article>

      <aside class="side-grid">
        <article class="card">
          <span class="badge">后续接入</span>
          <h3>知乎写作 Agent</h3>
          <p class="muted">登录后可使用，第一版先保留入口。</p>
        </article>
        <article class="card">
          <span class="badge">后续接入</span>
          <h3>数学文章 Agent</h3>
          <p class="muted">登录后可使用，第一版先保留入口。</p>
        </article>
        <article class="card">
          <span class="badge">后续接入</span>
          <h3>金融文章 Agent</h3>
          <p class="muted">登录后可使用，第一版先保留入口。</p>
        </article>
        <article class="card">
          <h3>最近文件</h3>
          <div id="file-list" class="file-list muted">登录后显示。</div>
        </article>
      </aside>
    </section>
  </main>

  <script>
    const state = { authenticated: false };
    const loginStatus = document.getElementById("login-status");
    const statusDot = document.getElementById("status-dot");
    const authMessage = document.getElementById("auth-message");
    const novelMessage = document.getElementById("novel-message");
    const resultBox = document.getElementById("run-result");
    const latestPreview = document.getElementById("latest-preview");
    const fileList = document.getElementById("file-list");
    const sendEmail = document.getElementById("send-email");
    const emailRow = document.getElementById("email-row");

    const fields = {
      article_type: document.getElementById("article-type"),
      min_words: document.getElementById("min-words"),
      max_words: document.getElementById("max-words"),
      description: document.getElementById("description"),
      style: document.getElementById("style"),
      email_to: document.getElementById("email-to"),
    };

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(data.detail || "请求失败。");
      }
      return data;
    }

    function renderAuth(user) {
      state.authenticated = Boolean(user.authenticated);
      loginStatus.textContent = state.authenticated ? `已登录：${user.username}` : "未登录";
      statusDot.classList.toggle("ok", state.authenticated);
    }

    async function refreshMe() {
      const user = await requestJson("/api/auth/me");
      renderAuth(user);
      if (state.authenticated) {
        await refreshFiles();
      }
    }

    async function refreshFiles() {
      try {
        const files = await requestJson("/api/novel/files");
        if (!files.length) {
          fileList.textContent = "暂无输出文件。";
          return;
        }
        fileList.innerHTML = "";
        files.slice(0, 6).forEach((file) => {
          const link = document.createElement("a");
          link.className = "file-link";
          link.href = `/api/novel/files/${file.id}`;
          link.target = "_blank";
          link.textContent = file.relative_path;
          fileList.appendChild(link);
        });
      } catch (error) {
        fileList.textContent = error.message;
      }
    }

    function clearFieldErrors() {
      Object.values(fields).forEach((field) => {
        const wrapper = field.closest(".field");
        const error = wrapper ? wrapper.querySelector(".field-error") : null;
        if (wrapper) {
          wrapper.classList.remove("invalid");
        }
        if (error) {
          error.textContent = "";
        }
      });
    }

    function addFieldError(field, message) {
      const wrapper = field.closest(".field");
      const error = wrapper ? wrapper.querySelector(".field-error") : null;
      if (wrapper) {
        wrapper.classList.add("invalid");
      }
      if (error) {
        error.textContent = message;
      }
    }

    function focusFirstInvalid() {
      const firstInvalid = document.querySelector(".field.invalid input, .field.invalid select, .field.invalid textarea");
      if (!firstInvalid) {
        return;
      }
      firstInvalid.scrollIntoView({ behavior: "smooth", block: "center" });
      window.setTimeout(() => firstInvalid.focus({ preventScroll: true }), 250);
    }

    function validatePayload(payload) {
      clearFieldErrors();
      if (payload.action !== "generate") {
        return true;
      }

      if (!payload.article_type) {
        addFieldError(fields.article_type, "请选择文章类型。");
      }
      if (!fields.min_words.value.trim()) {
        addFieldError(fields.min_words, "请填写最小字数。");
      }
      if (!fields.max_words.value.trim()) {
        addFieldError(fields.max_words, "请填写最大字数。");
      }
      if (fields.min_words.value.trim() && Number(fields.min_words.value) < 100) {
        addFieldError(fields.min_words, "最小字数不能小于 100。");
      }
      if (fields.max_words.value.trim() && Number(fields.max_words.value) > 50000) {
        addFieldError(fields.max_words, "最大字数不能超过 50000。");
      }
      if (fields.min_words.value.trim() && fields.max_words.value.trim() && payload.max_words < payload.min_words) {
        addFieldError(fields.max_words, "最大字数不能小于最小字数。");
      }
      if (!payload.description.trim()) {
        addFieldError(fields.description, "请填写描述。");
      }
      if (!payload.style.trim()) {
        addFieldError(fields.style, "请填写风格。");
      }
      if (payload.send_email && !payload.email_to.trim()) {
        addFieldError(fields.email_to, "请填写收件邮箱。");
      }
      if (payload.send_email && payload.email_to.trim() && !fields.email_to.checkValidity()) {
        addFieldError(fields.email_to, "请填写有效的邮箱地址。");
      }

      const hasError = Boolean(document.querySelector(".field.invalid"));
      if (hasError) {
        novelMessage.textContent = "请先填写标红的必填项。";
        focusFirstInvalid();
        return false;
      }
      return true;
    }

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", () => {
        const wrapper = field.closest(".field");
        if (wrapper) {
          wrapper.classList.remove("invalid");
        }
      });
      field.addEventListener("change", () => {
        const wrapper = field.closest(".field");
        if (wrapper) {
          wrapper.classList.remove("invalid");
        }
      });
    });

    document.getElementById("login-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      authMessage.textContent = "";
      try {
        const data = await requestJson("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        renderAuth(data);
        authMessage.textContent = "登录成功。";
        await refreshFiles();
      } catch (error) {
        authMessage.textContent = error.message;
      }
    });

    document.getElementById("logout-button").addEventListener("click", async () => {
      await requestJson("/api/auth/logout", { method: "POST", body: "{}" });
      renderAuth({ authenticated: false, username: null });
      fileList.textContent = "登录后显示。";
      authMessage.textContent = "已退出登录。";
    });

    sendEmail.addEventListener("change", () => {
      emailRow.style.display = sendEmail.checked ? "grid" : "none";
      if (!sendEmail.checked) {
        const wrapper = fields.email_to.closest(".field");
        wrapper.classList.remove("invalid");
        fields.email_to.value = "";
      }
    });

    document.getElementById("run-novel").addEventListener("click", async () => {
      novelMessage.textContent = "";
      if (!state.authenticated) {
        novelMessage.textContent = "请先登录后再使用该功能。";
        return;
      }

      const payload = {
        action: document.getElementById("novel-action").value,
        article_type: fields.article_type.value,
        min_words: Number(fields.min_words.value),
        max_words: Number(fields.max_words.value),
        description: fields.description.value,
        style: fields.style.value,
        de_ai: document.getElementById("de-ai").checked,
        send_email: sendEmail.checked,
        email_to: fields.email_to.value,
      };

      if (!validatePayload(payload)) {
        return;
      }

      resultBox.textContent = "执行中...";
      latestPreview.textContent = "等待输出...";

      try {
        const data = await requestJson("/api/novel/run", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        resultBox.textContent = [
          `returncode: ${data.returncode}`,
          data.email && data.email.requested ? `email: ${data.email.message}` : "",
          "",
          "stdout:",
          data.stdout || "(empty)",
          "",
          "stderr:",
          data.stderr || "(empty)",
        ].filter(Boolean).join("\n");
        latestPreview.textContent = data.latest_file
          ? `${data.latest_file.relative_path}\n\n${data.latest_file.preview}`
          : "暂无输出。";
        await refreshFiles();
      } catch (error) {
        resultBox.textContent = error.message;
        latestPreview.textContent = "执行失败。";
      }
    });

    refreshMe().catch((error) => {
      loginStatus.textContent = "登录状态读取失败";
      authMessage.textContent = error.message;
    });
  </script>
</body>
</html>
